# ============================================================
# Fabric CI/CD Deploy — Option 3 — Fabric Deployment Pipelines
# Triggers on PR merge to main.
# Calls Fabric Deployment Pipeline REST API to promote stages.
# ============================================================
 
name: Fabric CI/CD Deploy (Option 3)
 
on:
  push:
    branches:
      - main
    paths:
      - 'fabric/**'   # Only trigger when Fabric items change
 
  workflow_dispatch:
    inputs:
      target:
        description: 'Deployment target: test, prod, or both'
        required: false
        default: 'both'
 
env:
  PYTHON_VERSION: '3.12'
 
jobs:
 
  # ── Job 1: Deploy Dev → Test ─────────────────────────────
  deploy-to-test:
    name: Deploy Dev to Test
    runs-on: ubuntu-latest
    environment: test
    env:
      AZURE_TENANT_ID:     ${{ secrets.AZURE_TENANT_ID }}
      AZURE_CLIENT_ID:     ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      FABRIC_PIPELINE_ID:  ${{ vars.FABRIC_PIPELINE_ID }}
      DEV_STAGE_ID:        ${{ vars.DEV_STAGE_ID }}
      TEST_STAGE_ID:       ${{ vars.TEST_STAGE_ID }}
      PROD_STAGE_ID:       ${{ vars.PROD_STAGE_ID }}
 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
 
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
 
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install azure-identity requests
 
      - name: Deploy Dev to Test
        run: |
          python .deploy/deploy-option3.py \
            --aztenantid    "$AZURE_TENANT_ID" \
            --azclientid    "$AZURE_CLIENT_ID" \
            --azspsecret    "$AZURE_CLIENT_SECRET" \
            --pipeline_id   "$FABRIC_PIPELINE_ID" \
            --dev_stage_id  "$DEV_STAGE_ID" \
            --test_stage_id "$TEST_STAGE_ID" \
            --prod_stage_id "$PROD_STAGE_ID" \
            --target        "test"
 
      - name: Deployment summary
        if: always()
        run: |
          echo '## Deploy Dev → Test' >> $GITHUB_STEP_SUMMARY
          echo '| Field | Value |' >> $GITHUB_STEP_SUMMARY
          echo '|---|---|' >> $GITHUB_STEP_SUMMARY
          echo "| Status | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
 
  # ── Job 2: Deploy Test → Prod ────────────────────────────
  # Depends on deploy-to-test completing successfully.
  # Pauses at 'production' GitHub Environment for approval.
  deploy-to-prod:
    name: Deploy Test to Prod
    runs-on: ubuntu-latest
    needs: deploy-to-test        # Only runs after Test deploy succeeds
    environment: production      # Approval gate — requires GitHub Team plan
    env:
      AZURE_TENANT_ID:     ${{ secrets.AZURE_TENANT_ID }}
      AZURE_CLIENT_ID:     ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      FABRIC_PIPELINE_ID:  ${{ vars.FABRIC_PIPELINE_ID }}
      DEV_STAGE_ID:        ${{ vars.DEV_STAGE_ID }}
      TEST_STAGE_ID:       ${{ vars.TEST_STAGE_ID }}
      PROD_STAGE_ID:       ${{ vars.PROD_STAGE_ID }}
 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
 
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
 
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install azure-identity requests
 
      - name: Deploy Test to Prod
        run: |
          python .deploy/deploy-option3.py \
            --aztenantid    "$AZURE_TENANT_ID" \
            --azclientid    "$AZURE_CLIENT_ID" \
            --azspsecret    "$AZURE_CLIENT_SECRET" \
            --pipeline_id   "$FABRIC_PIPELINE_ID" \
            --dev_stage_id  "$DEV_STAGE_ID" \
            --test_stage_id "$TEST_STAGE_ID" \
            --prod_stage_id "$PROD_STAGE_ID" \
            --target        "prod"
 
      - name: Deployment summary
        if: always()
        run: |
          echo '## Deploy Test → Prod' >> $GITHUB_STEP_SUMMARY
          echo '| Field | Value |' >> $GITHUB_STEP_SUMMARY
          echo '|---|---|' >> $GITHUB_STEP_SUMMARY
          echo "| Status | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
