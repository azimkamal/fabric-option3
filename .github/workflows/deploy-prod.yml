# ============================================================
# deploy-prod.yml
# Workflow 2 — Deploy Test → Prod
#
# Trigger : Git tag pushed (v*) — via GitHub Releases UI
#           Go to: GitHub Repo → Releases → Draft a new release
#           Create tag e.g. v1.2.0, add release notes, publish.
#
# Gate    : environment: production (Business + IT approval)
# What    : Promotes Test Workspace → Prod Workspace
#           via Fabric Deployment Pipeline REST API
#
# Release process:
#   1. UAT complete, sign-off received (email / Teams)
#   2. Tech lead opens GitHub → Releases → Draft new release
#   3. Creates tag: v1.2.0
#   4. Fills release title + notes (include sign-off reference)
#   5. Clicks "Publish release"
#   6. This workflow triggers automatically
#   7. Business + IT approve in GitHub Environments
#   8. Test → Prod deployed
# ============================================================

name: Deploy — Test to Prod

on:
  push:
    tags:
      - 'v*'            # Triggers on any tag: v1.0.0, v1.2.3, etc

env:
  PYTHON_VERSION: '3.12'

jobs:

  # ──────────────────────────────────────────
  # JOB 1: Log release details
  # Captures tag name and release info for audit
  # ──────────────────────────────────────────
  log-release:
    name: Log Release Details
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get release info
        id: release-info
        run: |
          TAG="${{ github.ref_name }}"
          COMMIT="${{ github.sha }}"
          ACTOR="${{ github.actor }}"
          TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M:%S UTC')

          echo "tag=$TAG"           >> $GITHUB_OUTPUT
          echo "commit=$COMMIT"     >> $GITHUB_OUTPUT
          echo "actor=$ACTOR"       >> $GITHUB_OUTPUT
          echo "timestamp=$TIMESTAMP" >> $GITHUB_OUTPUT

          echo "================================================"
          echo " Production Release Initiated"
          echo "================================================"
          echo " Tag         : $TAG"
          echo " Commit      : $COMMIT"
          echo " Initiated by: $ACTOR"
          echo " Timestamp   : $TIMESTAMP"
          echo "================================================"
          echo ""
          echo "ℹ️  Release notes and sign-off reference are"
          echo "   recorded in GitHub Releases for this tag."
          echo "   GitHub → Releases → $TAG"

  # ──────────────────────────────────────────
  # JOB 2: Deploy Test → Prod
  # Gate: Business + IT must approve in GitHub
  #       Settings → Environments → production
  # Only runs after log-release job succeeds
  # ──────────────────────────────────────────
  deploy-to-prod:
    name: Deploy Test to Prod
    runs-on: ubuntu-latest
    needs: log-release            # Only proceeds after release is logged
    environment: production       # ← GitHub pauses here for Business + IT approval
    env:
      AZURE_TENANT_ID:     ${{ secrets.AZURE_TENANT_ID }}
      AZURE_CLIENT_ID:     ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      FABRIC_PIPELINE_ID:  ${{ vars.FABRIC_PIPELINE_ID }}
      DEV_STAGE_ID:        ${{ vars.DEV_STAGE_ID }}
      TEST_STAGE_ID:       ${{ vars.TEST_STAGE_ID }}
      PROD_STAGE_ID:       ${{ vars.PROD_STAGE_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install azure-identity requests

      - name: Deploy Test to Prod
        run: |
          python .deploy/deploy-option3.py \
            --aztenantid    "$AZURE_TENANT_ID" \
            --azclientid    "$AZURE_CLIENT_ID" \
            --azspsecret    "$AZURE_CLIENT_SECRET" \
            --pipeline_id   "$FABRIC_PIPELINE_ID" \
            --dev_stage_id  "$DEV_STAGE_ID" \
            --test_stage_id "$TEST_STAGE_ID" \
            --prod_stage_id "$PROD_STAGE_ID" \
            --target        "prod"

      - name: Deployment summary
        if: always()
        run: |
          echo '## Deploy Test → Prod' >> $GITHUB_STEP_SUMMARY
          echo '| Field | Value |' >> $GITHUB_STEP_SUMMARY
          echo '|---|---|' >> $GITHUB_STEP_SUMMARY
          echo "| Status       | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Release tag  | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit       | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Timestamp    | $(date -u '+%Y-%m-%d %H:%M:%S UTC') |" >> $GITHUB_STEP_SUMMARY
          echo "| Release notes| GitHub → Releases → ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Production deployment FAILED."
          echo "Release tag : ${{ github.ref_name }}"
          echo "Triggered by: ${{ github.actor }}"
          echo "Prod Workspace is UNCHANGED. Investigate immediately."
          echo "Check: GitHub → Actions → Deploy Test to Prod → ${{ github.ref_name }}"

# ──────────────────────────────────────────
# GitHub Secrets (repository level):
#   AZURE_TENANT_ID         — Azure AD tenant ID
#   AZURE_CLIENT_ID         — Service principal client ID
#   AZURE_CLIENT_SECRET     — Service principal client secret
#
# GitHub Variables (repository level):
#   FABRIC_PIPELINE_ID      — Fabric Deployment Pipeline ID
#   DEV_STAGE_ID            — Stage ID for Dev
#   TEST_STAGE_ID           — Stage ID for Test
#   PROD_STAGE_ID           — Stage ID for Prod
#
# GitHub Environment (Settings → Environments → production):
#   Required reviewers : Business Owner, IT Lead
#   Wait timer         : optional (e.g. 30 mins after approval)
#
# How to trigger (GitHub Releases UI):
#   1. GitHub Repo → Releases → Draft a new release
#   2. Choose a tag → type v1.2.0 (or next version)
#   3. Set release title e.g. "Release v1.2.0 — [feature name]"
#   4. Write release notes — include:
#        - What changed
#        - UAT sign-off by [name] on [date]
#        - Reference to sign-off email/ticket if applicable
#   5. Click "Publish release"
#   6. This workflow triggers automatically
# ──────────────────────────────────────────
